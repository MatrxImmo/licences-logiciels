<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail - Logiciel</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- ========================================== -->
    <!-- PAGE 3 : Détail du logiciel                -->
    <!-- ========================================== -->

    <header class="header glass">
        <div class="header-logo"><i class="fas fa-key"></i> LicenceFlow</div>
        <div class="header-actions">
            <a href="catalogue.html" class="btn btn-outline">← Retour au catalogue</a>
            <a href="php/logout.php" class="btn btn-icon"><i class="fas fa-sign-out-alt"></i></a>
        </div>
    </header>

    <main class="detail-main">
        <div class="detail-card glass" id="detail-content">
            <!-- Contenu injecté par PHP via paramètre ?id= -->
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        // Récupérer l'ID du logiciel depuis l'URL
        const params = new URLSearchParams(window.location.search);
        const logicielId = params.get('id');

        window.onload = function() {
            if (logicielId) {
                fetch('php/detail.php?id=' + logicielId)
                    .then(response => response.text())
                    .then(data => {
                        document.getElementById('detail-content').innerHTML = data;
                    });
            } else {
                document.getElementById('detail-content').innerHTML = '<p class="error">Logiciel introuvable.</p>';
            }
        };
    </script>
</body>
</html>
